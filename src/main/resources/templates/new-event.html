<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Nieuw evenement - NGO Anderlecht')}"></head>

<body class="bg-[#f5f3f0] min-h-screen flex flex-col text-gray-900">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-28">
        <div class="max-w-2xl mx-auto px-6 pb-20">
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-1">Nieuw evenement</h1>
            <p class="text-gray-400 text-sm mb-10">Vul alle gegevens in om een nieuw evenement toe te voegen</p>

            <div class="bg-white rounded-2xl border border-gray-100 p-8">
                <form th:action="@{/new}" th:object="${event}" method="post">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Tijdstip</label>
                            <input type="datetime-local" th:field="*{tijdstip}"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('tijdstip')}" th:errors="*{tijdstip}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Titel</label>
                            <input type="text" th:field="*{titel}"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Omschrijving</label>
                            <textarea th:field="*{omschrijving}" rows="4"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all resize-none"></textarea>
                            <p th:if="${#fields.hasErrors('omschrijving')}" th:errors="*{omschrijving}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Organisatie</label>
                                <input type="text" th:field="*{organisatie}"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                                <p th:if="${#fields.hasErrors('organisatie')}" th:errors="*{organisatie}" class="text-red-500 text-xs mt-1.5"></p>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">E-mail contact</label>
                                <input type="email" th:field="*{contactEmail}"
                                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                                <p th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}" class="text-red-500 text-xs mt-1.5"></p>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Locatie</label>
                            <select th:field="*{locatie}"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                                <option value="">-- Selecteer een locatie --</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.naam + ' - ' + loc.adres}">Locatie</option>
                            </select>
                            <p th:if="${#fields.hasErrors('locatie')}" th:errors="*{locatie}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-8">
                        <button type="submit"
                            class="flex-1 bg-gray-900 text-white py-2.5 rounded-xl hover:bg-gray-800 font-medium transition-all text-sm">Opslaan</button>
                        <a th:href="@{/}"
                            class="px-5 py-2.5 rounded-xl border border-gray-200 hover:bg-gray-50 font-medium transition-all text-sm text-gray-600 text-center">Annuleren</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
