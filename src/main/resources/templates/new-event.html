<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Nieuw evenement - NGO Anderlecht')}"></head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow container mx-auto px-6 py-10">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Nieuw evenement toevoegen</h1>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <form th:action="@{/new}" th:object="${event}" method="post">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Tijdstip</label>
                            <input type="datetime-local" th:field="*{tijdstip}"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('tijdstip')}" th:errors="*{tijdstip}" class="text-red-500 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Titel</label>
                            <input type="text" th:field="*{titel}"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}" class="text-red-500 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Omschrijving</label>
                            <textarea th:field="*{omschrijving}" rows="4"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all"></textarea>
                            <p th:if="${#fields.hasErrors('omschrijving')}" th:errors="*{omschrijving}" class="text-red-500 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Organisatie</label>
                            <input type="text" th:field="*{organisatie}"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('organisatie')}" th:errors="*{organisatie}" class="text-red-500 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">E-mail contactpersoon</label>
                            <input type="email" th:field="*{contactEmail}"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}" class="text-red-500 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Locatie</label>
                            <select th:field="*{locatie.id}"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all">
                                <option value="">-- Selecteer een locatie --</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}"
                                    th:text="${loc.naam + ' - ' + loc.adres}">Locatie</option>
                            </select>
                            <p th:if="${#fields.hasErrors('locatie')}" th:errors="*{locatie}" class="text-red-500 text-sm mt-1"></p>
                        </div>
                    </div>

                    <div class="flex gap-4 mt-8">
                        <button type="submit"
                            class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-6 py-2.5 rounded-lg hover:from-purple-700 hover:to-indigo-700 font-semibold shadow-md transition-all">Opslaan</button>
                        <a th:href="@{/}"
                            class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg hover:bg-gray-200 font-semibold transition-colors">Annuleren</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
