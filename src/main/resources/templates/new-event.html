<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Nieuw evenement - NGO Anderlecht')}"></head>

<body class="bg-[#0a0a0f] min-h-screen flex flex-col text-white">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-32 relative overflow-hidden">
        <div class="blob w-[400px] h-[400px] bg-violet-600/30 top-0 right-0"></div>

        <div class="max-w-2xl mx-auto px-6 relative z-10 pb-16">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">
                <span class="bg-gradient-to-r from-white to-purple-300 bg-clip-text text-transparent">Nieuw evenement</span>
            </h1>
            <p class="text-white/40 mb-10">Vul alle gegevens in om een nieuw evenement toe te voegen</p>

            <div class="glass rounded-3xl p-8">
                <form th:action="@{/new}" th:object="${event}" method="post">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">Tijdstip</label>
                            <input type="datetime-local" th:field="*{tijdstip}"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all placeholder-white/30">
                            <p th:if="${#fields.hasErrors('tijdstip')}" th:errors="*{tijdstip}" class="text-red-400 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">Titel</label>
                            <input type="text" th:field="*{titel}"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all placeholder-white/30">
                            <p th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}" class="text-red-400 text-sm mt-1"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">Omschrijving</label>
                            <textarea th:field="*{omschrijving}" rows="4"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all placeholder-white/30 resize-none"></textarea>
                            <p th:if="${#fields.hasErrors('omschrijving')}" th:errors="*{omschrijving}" class="text-red-400 text-sm mt-1"></p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-white/60 mb-2">Organisatie</label>
                                <input type="text" th:field="*{organisatie}"
                                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all placeholder-white/30">
                                <p th:if="${#fields.hasErrors('organisatie')}" th:errors="*{organisatie}" class="text-red-400 text-sm mt-1"></p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-white/60 mb-2">E-mail contact</label>
                                <input type="email" th:field="*{contactEmail}"
                                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all placeholder-white/30">
                                <p th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}" class="text-red-400 text-sm mt-1"></p>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">Locatie</label>
                            <select th:field="*{locatie.id}"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all">
                                <option value="" class="bg-[#0a0a0f]">-- Selecteer een locatie --</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.naam + ' - ' + loc.adres}" class="bg-[#0a0a0f]">Locatie</option>
                            </select>
                            <p th:if="${#fields.hasErrors('locatie')}" th:errors="*{locatie}" class="text-red-400 text-sm mt-1"></p>
                        </div>
                    </div>

                    <div class="flex gap-4 mt-8">
                        <button type="submit"
                            class="flex-1 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white py-3.5 rounded-xl hover:from-violet-500 hover:to-fuchsia-500 font-semibold shadow-2xl shadow-purple-500/30 transition-all">Opslaan</button>
                        <a th:href="@{/}"
                            class="px-6 py-3.5 rounded-xl glass hover:bg-white/10 font-semibold transition-all text-center">Annuleren</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
