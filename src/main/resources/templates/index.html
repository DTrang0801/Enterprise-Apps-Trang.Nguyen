<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Home - NGO Anderlecht')}"></head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" class="w-full h-full">
                <circle cx="200" cy="300" r="80" fill="#7c3aed" opacity="0.3"/>
                <circle cx="400" cy="250" r="60" fill="#8b5cf6" opacity="0.3"/>
                <circle cx="600" cy="350" r="90" fill="#6d28d9" opacity="0.3"/>
                <circle cx="800" cy="280" r="70" fill="#a78bfa" opacity="0.3"/>
                <circle cx="1000" cy="320" r="85" fill="#7c3aed" opacity="0.3"/>
                <ellipse cx="300" cy="400" rx="120" ry="60" fill="#8b5cf6" opacity="0.2"/>
                <ellipse cx="700" cy="450" rx="150" ry="70" fill="#6d28d9" opacity="0.2"/>
                <ellipse cx="1000" cy="380" rx="100" ry="50" fill="#a78bfa" opacity="0.2"/>
                <path d="M100,500 Q200,400 300,500 T500,500" stroke="#7c3aed" fill="none" stroke-width="3" opacity="0.2"/>
                <path d="M400,480 Q500,380 600,480 T800,480" stroke="#8b5cf6" fill="none" stroke-width="3" opacity="0.2"/>
                <path d="M700,520 Q800,420 900,520 T1100,520" stroke="#6d28d9" fill="none" stroke-width="3" opacity="0.2"/>
            </svg>
        </div>

        <div class="bg-gradient-to-br from-purple-50 to-indigo-50 py-16 relative z-10">
            <div class="container mx-auto px-6">
                <h1 class="text-5xl font-bold text-gray-900 mb-3">Evenementen</h1>
                <p class="text-gray-600 text-lg">Ontdek de laatste activiteiten van onze gemeenschap</p>
            </div>
        </div>

        <div class="container mx-auto px-6 py-8 relative z-10">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Titel</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Organisatie</th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Details</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr th:each="event : ${events}" class="hover:bg-purple-50/50 transition-colors">
                            <td class="px-6 py-4 font-medium text-gray-900" th:text="${event.titel}">Titel</td>
                            <td class="px-6 py-4 text-gray-600" th:text="${event.organisatie}">Organisatie</td>
                            <td class="px-6 py-4 text-center">
                                <a th:href="@{/details/{id}(id=${event.id})}"
                                    class="inline-block bg-purple-600 text-white px-4 py-1.5 rounded-md hover:bg-purple-700 text-sm font-medium transition-colors">Details</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(events)}">
                            <td colspan="3" class="px-6 py-12 text-center text-gray-400">Geen evenementen gevonden.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-8 text-center">
                <a th:href="@{/new}"
                    class="inline-block bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-8 py-3 rounded-lg hover:from-purple-700 hover:to-indigo-700 font-semibold shadow-md transition-all">
                    + Nieuw evenement toevoegen
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
