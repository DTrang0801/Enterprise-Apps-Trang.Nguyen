<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Home - NGO Anderlecht')}"></head>

<body class="bg-[#f5f3f0] min-h-screen flex flex-col text-gray-900">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-24">
        <div class="max-w-6xl mx-auto px-6">
            <div class="py-12 mb-8">
                <h1 class="text-4xl font-bold text-gray-900 tracking-tight mb-2">Evenementen</h1>
                <p class="text-gray-500 text-base max-w-lg">Overzicht van de laatste evenementen</p>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden mb-8">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Titel</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Organisatie</th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Details</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr th:each="event : ${events}" class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 font-medium text-gray-900" th:text="${event.titel}">Titel</td>
                            <td class="px-6 py-4 text-gray-600" th:text="${event.organisatie}">Organisatie</td>
                            <td class="px-6 py-4 text-center">
                                <a th:href="@{/details/{id}(id=${event.id})}"
                                    class="inline-block bg-gray-900 text-white px-4 py-1.5 rounded-lg hover:bg-gray-800 text-sm font-medium transition-colors">Details</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(events)}">
                            <td colspan="3" class="px-6 py-12 text-center text-gray-400">Geen evenementen gevonden.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="text-center pb-20">
                <a th:href="@{/new}"
                    class="inline-flex items-center gap-2 bg-gray-900 text-white px-6 py-3 rounded-xl hover:bg-gray-800 font-medium shadow-sm transition-all text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Nieuw evenement toevoegen
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
