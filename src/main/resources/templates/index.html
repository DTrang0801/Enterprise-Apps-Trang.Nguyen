<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Home - NGO Anderlecht')}"></head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="container mx-auto p-6 flex-grow">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Laatste evenementen</h1>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full">
                <thead class="bg-purple-800 text-white">
                    <tr>
                        <th class="p-3 text-left">Titel</th>
                        <th class="p-3 text-left">Organisatie</th>
                        <th class="p-3 text-center">Details</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}" class="border-b hover:bg-gray-50">
                        <td class="p-3" th:text="${event.titel}">Titel</td>
                        <td class="p-3" th:text="${event.organisatie}">Organisatie</td>
                        <td class="p-3 text-center">
                            <a th:href="@{/details/{id}(id=${event.id})}"
                                class="bg-purple-600 text-white px-3 py-1 rounded hover:bg-purple-700 text-sm">Details</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="3" class="p-4 text-center text-gray-500">Geen evenementen gevonden.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-6">
            <a th:href="@{/new}"
                class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 font-semibold">Nieuw evenement
                toevoegen</a>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
