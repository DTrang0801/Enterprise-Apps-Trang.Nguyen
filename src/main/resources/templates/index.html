<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Home - NGO Anderlecht')}"></head>

<body class="bg-[#0a0a0f] min-h-screen flex flex-col text-white">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-24 relative overflow-hidden">
        <div class="blob w-[500px] h-[500px] bg-violet-600/40 -top-40 -left-40"></div>
        <div class="blob w-[400px] h-[400px] bg-fuchsia-600/30 top-1/3 right-0"></div>
        <div class="blob w-[300px] h-[300px] bg-indigo-600/30 bottom-0 left-1/3"></div>

        <div class="max-w-7xl mx-auto px-6 relative z-10">
            <div class="mb-12">
                <div class="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-6">
                    <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-white/70 text-sm font-medium">3 actieve evenementen</span>
                </div>
                <h1 class="text-6xl font-extrabold tracking-tight mb-3">
                    <span class="bg-gradient-to-r from-white via-purple-200 to-fuchsia-300 bg-clip-text text-transparent">Evenementen</span>
                </h1>
                <p class="text-white/50 text-lg max-w-xl">Ontdek de laatste activiteiten van onze gemeenschap in Anderlecht</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-12">
                <div th:each="event : ${events}" class="glass rounded-2xl p-6 hover:scale-[1.02] transition-all duration-300 group cursor-pointer"
                     th:onclick="'window.location.href=\'/details/' + ${event.id} + '\''">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500/20 to-fuchsia-500/20 border border-white/10 flex items-center justify-center">
                            <svg class="w-5 h-5 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <span class="text-xs font-medium text-white/40 glass rounded-full px-3 py-1" th:text="${event.organisatie}">Org</span>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-2 group-hover:text-purple-300 transition-colors" th:text="${event.titel}">Titel</h3>
                    <p class="text-white/40 text-sm line-clamp-2 mb-4" th:text="${event.omschrijving}">Omschrijving</p>
                    <div class="flex items-center gap-2 text-white/30 text-xs">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span th:text="${event.locatie.naam}">Locatie</span>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(events)}" class="glass rounded-2xl p-16 text-center">
                <svg class="w-16 h-16 text-white/20 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <p class="text-white/40 text-lg">Geen evenementen gevonden</p>
            </div>

            <div class="text-center pb-16">
                <a th:href="@{/new}"
                    class="inline-flex items-center gap-2 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white px-8 py-4 rounded-2xl hover:from-violet-500 hover:to-fuchsia-500 font-semibold shadow-2xl shadow-purple-500/30 transition-all hover:scale-105">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Nieuw evenement toevoegen
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
