<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Home - NGO Anderlecht')}"></head>

<body class="bg-[#f5f3f0] min-h-screen flex flex-col text-gray-900">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-24">
        <div class="max-w-6xl mx-auto px-6">
            <div class="py-12 mb-8">
                <div class="inline-flex items-center gap-2 bg-violet-50 border border-violet-100 rounded-full px-4 py-1.5 mb-5">
                    <div class="w-1.5 h-1.5 rounded-full bg-violet-500"></div>
                    <span class="text-violet-700 text-xs font-medium" th:text="${#lists.size(events)} + ' evenementen beschikbaar'">3 evenementen</span>
                </div>
                <h1 class="text-4xl font-bold text-gray-900 tracking-tight mb-2">Evenementen</h1>
                <p class="text-gray-500 text-base max-w-lg">Ontdek de laatste activiteiten van onze gemeenschap in Anderlecht</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12">
                <div th:each="event : ${events}" class="bg-white rounded-2xl border border-gray-100 p-6 hover:border-violet-200 hover:shadow-lg hover:shadow-violet-500/5 transition-all duration-300 group cursor-pointer"
                     th:onclick="'window.location.href=\'/details/' + ${event.id} + '\''">
                    <div class="flex items-start justify-between mb-5">
                        <div class="w-10 h-10 rounded-xl bg-violet-50 border border-violet-100 flex items-center justify-center">
                            <svg class="w-5 h-5 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <span class="text-xs font-medium text-gray-500 bg-gray-50 rounded-full px-3 py-1" th:text="${event.organisatie}">Org</span>
                    </div>
                    <h3 class="text-base font-semibold text-gray-900 mb-2 group-hover:text-violet-700 transition-colors" th:text="${event.titel}">Titel</h3>
                    <p class="text-gray-400 text-sm leading-relaxed line-clamp-2 mb-5" th:text="${event.omschrijving}">Omschrijving</p>
                    <div class="flex items-center gap-1.5 text-gray-400 text-xs">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span th:text="${event.locatie.naam}">Locatie</span>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(events)}" class="bg-white rounded-2xl border border-gray-100 p-16 text-center mb-12">
                <svg class="w-12 h-12 text-gray-200 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <p class="text-gray-400">Geen evenementen gevonden</p>
            </div>

            <div class="text-center pb-20">
                <a th:href="@{/new}"
                    class="inline-flex items-center gap-2 bg-gray-900 text-white px-6 py-3 rounded-xl hover:bg-gray-800 font-medium shadow-sm transition-all text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Nieuw evenement toevoegen
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
