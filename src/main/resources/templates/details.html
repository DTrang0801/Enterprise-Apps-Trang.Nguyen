<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Details - NGO Anderlecht')}"></head>

<body class="bg-gray-50/50 min-h-screen flex flex-col text-gray-900">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-28">
        <div class="max-w-4xl mx-auto px-6 pb-20">
            <a th:href="@{/}" class="inline-flex items-center gap-1.5 text-gray-400 hover:text-gray-700 transition-colors mb-8 text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Terug naar overzicht
            </a>

            <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div class="p-8 border-b border-gray-50">
                    <span class="inline-block text-xs font-semibold text-violet-700 bg-violet-50 rounded-full px-3 py-1 mb-4" th:text="${event.organisatie}">Organisatie</span>
                    <h1 class="text-3xl font-bold text-gray-900 tracking-tight" th:text="${event.titel}">Titel</h1>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-gray-50">
                    <div class="p-6">
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">Tijdstip</p>
                        <p class="text-gray-900 font-medium text-sm" th:text="${#temporals.format(event.tijdstip, 'dd/MM/yyyy HH:mm')}">Tijdstip</p>
                    </div>
                    <div class="p-6">
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">Locatie</p>
                        <p class="text-gray-900 font-medium text-sm" th:text="${event.locatie.naam}">Locatie</p>
                        <p class="text-gray-400 text-xs mt-1" th:text="${event.locatie.adres}">Adres</p>
                        <p class="text-gray-400 text-xs">Capaciteit: <span th:text="${event.locatie.capaciteit}">0</span> personen</p>
                    </div>
                    <div class="p-6">
                        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1.5">Contact</p>
                        <a th:href="'mailto:' + ${event.contactEmail}" th:text="${event.contactEmail}"
                            class="text-violet-600 hover:text-violet-800 font-medium text-sm transition-colors">E-mail</a>
                    </div>
                </div>

                <div class="p-8 border-t border-gray-50">
                    <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Omschrijving</p>
                    <p class="text-gray-600 leading-relaxed" th:text="${event.omschrijving}">Omschrijving</p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
