<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Details - NGO Anderlecht')}"></head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow container mx-auto px-6 py-10">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-900 mb-8" th:text="${event.titel}">Titel</h1>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Tijdstip</h2>
                        <p class="text-gray-900 font-medium" th:text="${#temporals.format(event.tijdstip, 'dd/MM/yyyy HH:mm')}">Tijdstip</p>
                    </div>

                    <div>
                        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Organisatie</h2>
                        <p class="text-gray-900 font-medium" th:text="${event.organisatie}">Organisatie</p>
                    </div>

                    <div>
                        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Contact e-mail</h2>
                        <a th:href="'mailto:' + ${event.contactEmail}" th:text="${event.contactEmail}"
                            class="text-purple-600 hover:text-purple-800 font-medium transition-colors">E-mail</a>
                    </div>

                    <div>
                        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Locatie</h2>
                        <p class="text-gray-900 font-medium" th:text="${event.locatie.naam}">Locatie naam</p>
                        <p class="text-gray-500 text-sm" th:text="${event.locatie.adres}">Adres</p>
                        <p class="text-gray-500 text-sm">Capaciteit: <span th:text="${event.locatie.capaciteit}">0</span> personen</p>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-100">
                    <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Omschrijving</h2>
                    <p class="text-gray-700 leading-relaxed" th:text="${event.omschrijving}">Omschrijving</p>
                </div>

                <div class="mt-8">
                    <a th:href="@{/}"
                        class="inline-block bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-6 py-2.5 rounded-lg hover:from-purple-700 hover:to-indigo-700 font-semibold shadow-md transition-all">Terug naar overzicht</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
