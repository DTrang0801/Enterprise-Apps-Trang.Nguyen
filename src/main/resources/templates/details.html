<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Details - NGO Anderlecht')}"></head>

<body class="bg-[#0a0a0f] min-h-screen flex flex-col text-white">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-32 relative overflow-hidden">
        <div class="blob w-[400px] h-[400px] bg-violet-600/30 top-0 left-1/4"></div>
        <div class="blob w-[300px] h-[300px] bg-fuchsia-600/20 bottom-0 right-0"></div>

        <div class="max-w-4xl mx-auto px-6 relative z-10">
            <a th:href="@{/}" class="inline-flex items-center gap-2 text-white/50 hover:text-white transition-colors mb-8 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Terug naar overzicht
            </a>

            <div class="glass rounded-3xl p-10">
                <div class="flex items-start justify-between mb-8">
                    <div>
                        <span class="inline-block text-xs font-semibold text-violet-300 glass rounded-full px-4 py-1.5 mb-4" th:text="${event.organisatie}">Organisatie</span>
                        <h1 class="text-4xl font-extrabold tracking-tight" th:text="${event.titel}">Titel</h1>
                    </div>
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500/20 to-fuchsia-500/20 border border-white/10 flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass-dark rounded-2xl p-5">
                        <p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-2">Tijdstip</p>
                        <p class="text-white font-semibold" th:text="${#temporals.format(event.tijdstip, 'dd/MM/yyyy HH:mm')}">Tijdstip</p>
                    </div>
                    <div class="glass-dark rounded-2xl p-5">
                        <p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-2">Locatie</p>
                        <p class="text-white font-semibold" th:text="${event.locatie.naam}">Locatie</p>
                        <p class="text-white/40 text-sm mt-1" th:text="${event.locatie.adres}">Adres</p>
                    </div>
                    <div class="glass-dark rounded-2xl p-5">
                        <p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-2">Contact</p>
                        <a th:href="'mailto:' + ${event.contactEmail}" th:text="${event.contactEmail}"
                            class="text-violet-400 hover:text-violet-300 font-semibold transition-colors">E-mail</a>
                        <p class="text-white/40 text-sm mt-1">Capaciteit: <span th:text="${event.locatie.capaciteit}">0</span> personen</p>
                    </div>
                </div>

                <div class="border-t border-white/10 pt-8">
                    <p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-3">Omschrijving</p>
                    <p class="text-white/70 leading-relaxed text-lg" th:text="${event.omschrijving}">Omschrijving</p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
