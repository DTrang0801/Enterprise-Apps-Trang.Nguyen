<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Contact - NGO Anderlecht')}"></head>

<body class="bg-[#0a0a0f] min-h-screen flex flex-col text-white">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-32 relative overflow-hidden">
        <div class="blob w-[400px] h-[400px] bg-fuchsia-600/30 top-0 left-0"></div>

        <div class="max-w-2xl mx-auto px-6 relative z-10 pb-16">
            <h1 class="text-5xl font-extrabold tracking-tight mb-3">
                <span class="bg-gradient-to-r from-white to-fuchsia-300 bg-clip-text text-transparent">Contact</span>
            </h1>
            <p class="text-white/40 text-lg mb-10">Stuur ons een bericht</p>

            <div th:if="${success}" class="glass rounded-2xl p-4 mb-6 border-l-4 border-green-500">
                <p class="text-green-400 text-sm font-medium" th:text="${success}">Succes</p>
            </div>
            <div th:if="${error}" class="glass rounded-2xl p-4 mb-6 border-l-4 border-red-500">
                <p class="text-red-400 text-sm font-medium" th:text="${error}">Fout</p>
            </div>

            <div class="glass rounded-3xl p-8">
                <form th:action="@{/contact}" th:object="${contactMessage}" method="post">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">Naam</label>
                            <input type="text" th:field="*{naam}"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('naam')}" th:errors="*{naam}" class="text-red-400 text-sm mt-1"></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">E-mail</label>
                            <input type="email" th:field="*{email}"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-400 text-sm mt-1"></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-white/60 mb-2">Bericht</label>
                            <textarea th:field="*{bericht}" rows="5"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none transition-all resize-none"></textarea>
                            <p th:if="${#fields.hasErrors('bericht')}" th:errors="*{bericht}" class="text-red-400 text-sm mt-1"></p>
                        </div>
                    </div>
                    <button type="submit"
                        class="mt-8 w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white py-3.5 rounded-xl hover:from-violet-500 hover:to-fuchsia-500 font-semibold shadow-2xl shadow-purple-500/30 transition-all">Versturen</button>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
