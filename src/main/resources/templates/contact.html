<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Contact - NGO Anderlecht')}"></head>

<body class="bg-[#f5f3f0] min-h-screen flex flex-col text-gray-900">
    <nav th:replace="~{layout :: nav}"></nav>

    <main class="flex-grow pt-28">
        <div class="max-w-2xl mx-auto px-6 pb-20">
            <h1 class="text-4xl font-bold text-gray-900 tracking-tight mb-2">Contact</h1>
            <p class="text-gray-400 text-base mb-10">Stuur ons een bericht</p>

            <div th:if="${success}" class="bg-green-50 border border-green-100 rounded-xl p-4 mb-6">
                <p class="text-green-700 text-sm font-medium" th:text="${success}">Succes</p>
            </div>
            <div th:if="${error}" class="bg-red-50 border border-red-100 rounded-xl p-4 mb-6">
                <p class="text-red-700 text-sm font-medium" th:text="${error}">Fout</p>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 p-8">
                <form th:action="@{/contact}" th:object="${contactMessage}" method="post">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Naam</label>
                            <input type="text" th:field="*{naam}"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('naam')}" th:errors="*{naam}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
                            <input type="email" th:field="*{email}"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all">
                            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Bericht</label>
                            <textarea th:field="*{bericht}" rows="5"
                                class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-gray-900 text-sm focus:ring-2 focus:ring-violet-500/20 focus:border-violet-400 outline-none transition-all resize-none"></textarea>
                            <p th:if="${#fields.hasErrors('bericht')}" th:errors="*{bericht}" class="text-red-500 text-xs mt-1.5"></p>
                        </div>
                    </div>
                    <button type="submit"
                        class="mt-8 w-full bg-gray-900 text-white py-2.5 rounded-xl hover:bg-gray-800 font-medium transition-all text-sm">Versturen</button>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>

</html>
