<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">NGO Anderlecht</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <nav th:fragment="nav" class="bg-purple-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a th:href="@{/}" class="text-xl font-bold">NGO Anderlecht</a>
            <div class="space-x-6">
                <a th:href="@{/}" class="hover:text-purple-200">Home</a>
                <a th:href="@{/new}" class="hover:text-purple-200">Nieuw evenement</a>
                <a th:href="@{/about}" class="hover:text-purple-200">Over ons</a>
                <a th:href="@{/contact}" class="hover:text-purple-200">Contact</a>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-gray-800 text-white text-center p-4 mt-8">
        <p>&copy; 2026 NGO Anderlecht. Alle rechten voorbehouden.</p>
    </footer>
</body>

</html>
