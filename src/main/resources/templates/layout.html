<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">NGO Anderlecht</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
        body { font-family: 'DM Sans', sans-serif; }
    </style>
</head>

<body>
    <nav th:fragment="nav" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a th:href="@{/}" class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-600 to-purple-600 flex items-center justify-center text-white font-bold text-xs">N</div>
                <span class="text-gray-900 font-semibold text-base tracking-tight">NGO Anderlecht</span>
            </a>
            <div class="flex items-center gap-1">
                <a th:href="@{/}" class="text-sm font-medium text-gray-600 hover:text-gray-900 px-3 py-2 rounded-lg hover:bg-gray-50 transition-all">Home</a>
                <a th:href="@{/new}" class="text-sm font-medium text-gray-600 hover:text-gray-900 px-3 py-2 rounded-lg hover:bg-gray-50 transition-all">Nieuw</a>
                <a th:href="@{/about}" class="text-sm font-medium text-gray-600 hover:text-gray-900 px-3 py-2 rounded-lg hover:bg-gray-50 transition-all">Over ons</a>
                <a th:href="@{/contact}" class="text-sm font-medium text-gray-600 hover:text-gray-900 px-3 py-2 rounded-lg hover:bg-gray-50 transition-all">Contact</a>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="border-t border-gray-100 bg-white">
        <div class="max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
            <p class="text-gray-400 text-sm">&copy; 2026 NGO Anderlecht</p>
            <div class="flex gap-6">
                <a href="#" class="text-gray-400 hover:text-gray-600 transition-colors text-sm">Privacy</a>
                <a href="#" class="text-gray-400 hover:text-gray-600 transition-colors text-sm">Voorwaarden</a>
            </div>
        </div>
    </footer>
</body>

</html>
